# Ivory-first research theme with navy data emphasis and restrained gold accents.

[theme]
base = "light"
primaryColor = "#0A3D62"
backgroundColor = "#F9F9F9"
secondaryBackgroundColor = "#F0F3F4"
codeBackgroundColor = "#EDF1F3"
textColor = "#2D3436"
linkColor = "#0A3D62"
borderColor = "#D8DEE1"
codeTextColor = "#0A3D62"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "none"
buttonRadius = "none"

font = "'IBM Plex Sans':https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
headingFont = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 15
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["42px", "25px", "19px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#D4AF37"
redColor = "#8C4A3F"
yellowColor = "#D4AF37"
orangeColor = "#A66F1F"
blueColor = "#0A3D62"
violetColor = "#506A7C"
grayColor = "#657179"

chartCategoricalColors = [
    "#0A3D62",
    "#D4AF37",
    "#2D3436",
    "#7E99AA",
]

dataframeBorderColor = "#D8DEE1"
dataframeHeaderBackgroundColor = "#E8EEF1"

[theme.sidebar]
backgroundColor = "#F9F9F9"
secondaryBackgroundColor = "#F0F3F4"
codeBackgroundColor = "#EDF1F3"
textColor = "#2D3436"
borderColor = "#D8DEE1"
primaryColor = "#0A3D62"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = "type"
showErrorLinks = false

[server]
headless = true
