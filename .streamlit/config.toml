# Flat charcoal research theme with navy structure, gold accents, and ivory type.

[theme]
base = "dark"
primaryColor = "#0A3D62"
backgroundColor = "#2D3436"
secondaryBackgroundColor = "#0A3D62"
codeBackgroundColor = "#2D3436"
textColor = "#F9F9F9"
linkColor = "#D4AF37"
borderColor = "#0A3D62"
codeTextColor = "#F9F9F9"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "none"
buttonRadius = "none"

font = "'IBM Plex Sans':https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
headingFont = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 15
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["42px", "25px", "19px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#D4AF37"
redColor = "#D4AF37"
yellowColor = "#D4AF37"
orangeColor = "#D4AF37"
blueColor = "#0A3D62"
violetColor = "#0A3D62"
grayColor = "#2D3436"

chartCategoricalColors = [
    "#0A3D62",
    "#D4AF37",
    "#F9F9F9",
    "#2D3436",
]

dataframeBorderColor = "#0A3D62"
dataframeHeaderBackgroundColor = "#0A3D62"

[theme.sidebar]
backgroundColor = "#2D3436"
secondaryBackgroundColor = "#0A3D62"
codeBackgroundColor = "#2D3436"
textColor = "#F9F9F9"
borderColor = "#0A3D62"
primaryColor = "#0A3D62"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = "type"
showErrorLinks = false

[server]
headless = true
