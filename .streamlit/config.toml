# Deep-navy research theme with restrained semantic use of the full reviewed palette.

[theme]
base = "dark"
primaryColor = "#2F6174"
backgroundColor = "#001722"
secondaryBackgroundColor = "#082B3A"
codeBackgroundColor = "#001E2C"
textColor = "#EAE2B7"
linkColor = "#FCBF49"
borderColor = "#355965"
codeTextColor = "#EAE2B7"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "6px"
buttonRadius = "6px"

font = "'IBM Plex Sans':https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
headingFont = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 15
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["42px", "25px", "19px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#A39457"
redColor = "#D62828"
yellowColor = "#FCBF49"
orangeColor = "#F77F00"
blueColor = "#5E8390"
violetColor = "#9C6D78"
grayColor = "#A6A18A"

chartCategoricalColors = [
    "#003049",
    "#D62828",
    "#F77F00",
    "#FCBF49",
    "#EAE2B7",
]

chartSequentialColors = [
    "#003049",
    "#542C3E",
    "#D62828",
    "#E64F15",
    "#F77F00",
    "#F99F24",
    "#FCBF49",
    "#F5CE75",
    "#EFDA9C",
    "#EAE2B7",
]

dataframeBorderColor = "#355965"
dataframeHeaderBackgroundColor = "#0B3443"

[theme.sidebar]
backgroundColor = "#001722"
secondaryBackgroundColor = "#082B3A"
codeBackgroundColor = "#001E2C"
textColor = "#EAE2B7"
borderColor = "#355965"
primaryColor = "#2F6174"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = "type"
showErrorLinks = false

[server]
headless = true
